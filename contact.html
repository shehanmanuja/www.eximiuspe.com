<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | Eximius Power & Energy</title>
  <meta name="description" content="Get in touch with Eximius Power & Energy (EPE). Find our office location, email coordinates, phone lines, and dispatch a query.">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Web Component Header -->
  <site-header></site-header>

  <main>
    <!-- Page Banner -->
    <div class="page-banner">
      <div class="container">
        <h1 class="page-banner-title">Connect With Our Engineers</h1>
        <ul class="breadcrumbs">
          <li><a href="index.html">Home</a></li>
          <li>Contact Us</li>
        </ul>
      </div>
    </div>

    <!-- Contact details and map segment -->
    <section class="container" style="padding: 60px 0;">
      <div class="grid-2 reveal" style="align-items: flex-start; gap: 50px;">
        
        <!-- Left: Form -->
        <div>
          <div class="cyber-card">
            <h3 style="margin-bottom: 25px; font-size: 1.3rem;">Secure Inquiry Dispatch</h3>
            <form class="cyber-form" onsubmit="submitStaticForm(event, 'Your message has been securely transmitted. EPE support services will review and contact you shortly.')">
              
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="contactName">Your Name *</label>
                  <input type="text" id="contactName" class="form-control" placeholder="e.g. Shehan Silva" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="contactEmail">Email Coordinates *</label>
                  <input type="email" id="contactEmail" class="form-control" placeholder="name@domain.com" required>
                </div>
              </div>

              <div class="form-group">
                <label class="form-label" for="contactSubject">Subject *</label>
                <input type="text" id="contactSubject" class="form-control" placeholder="e.g. Industrial Solar Feasibility Study" required>
              </div>

              <div class="form-group">
                <label class="form-label" for="contactMessage">Message *</label>
                <textarea id="contactMessage" class="form-control" placeholder="State your inquiry, project scope, or energy system capacity parameters." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Transmit Inquiry</button>
            </form>
          </div>
        </div>

        <!-- Right: Information and Google Maps -->
        <div>
          <div class="cyber-badge cyber-badge-blue">Headquarters</div>
          <h2>Contact Coordinates</h2>
          
          <ul class="footer-info" style="margin: 25px 0 40px; display: grid; gap: 20px; font-size: 1rem; color: var(--text-muted);">
            <li style="display: flex; gap: 15px;">
              <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: var(--neon-blue); flex-shrink: 0;"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
              <span>No. 45, Galle Road, Colombo 03, Sri Lanka</span>
            </li>
            <li style="display: flex; gap: 15px;">
              <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: var(--neon-blue); flex-shrink: 0;"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
              <span>+94 11 234 5678 / +94 11 234 5679</span>
            </li>
            <li style="display: flex; gap: 15px;">
              <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: var(--neon-blue); flex-shrink: 0;"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
              <span>info@eximiuspe.com / support@eximiuspe.com</span>
            </li>
          </ul>

          <!-- Google Maps with dark filter applied in css -->
          <div class="contact-map-wrapper">
            <iframe class="contact-map-iframe" 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3960.798467005423!2d79.8465056!3d6.9146828!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ae25940f9df50e3%3A0xe5a1b3be7a44f51e!2sGalle%20Rd%2C%20Colombo!5e0!3m2!1sen!2slk!4v1700000000000" 
                    allowfullscreen="" 
                    loading="lazy">
            </iframe>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- Web Component Footer -->
  <site-footer></site-footer>

  <!-- Script Includes -->
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
